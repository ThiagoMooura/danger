<div class="w-full h-52 bg-white z-0"></div>

<div class="cardwrap w-full pt-20 px-20 bg-black" #cardwrap>
  <div class="w-full bg-white absolute top-0 z-10 h-56">


  </div>


  <div class="background-light" #light></div>


  <div class="card relative bg-white p-2 flex flex-col gap-2 rounded-xl"
       *ngFor="let cardText of cards; let i = index"
       (mouseenter)="onCardMouseEnter($event, i)"
       [class.selected-card]="selectedCardIndex === i"
       [ngClass]="{
         'card-left': i === 0,
         'card-center': i === 1,
         'card-right': i === cards.length - 1
       }">

    <div class="w-full h-48 bg-green-600 rounded-md"></div>
    <p class="py-5">
      {{ cardText }}
    </p>
  </div>
</div>
